<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB HR Props</title>
<meta property="og:title" content="MLB HR Props" />
<meta property="og:description" content="Daily MLB home run props ranked by pitch-type collision model" />
<meta property="og:image" content="https://dm-2026.github.io/mlb-props/og-image.png" />
<meta property="og:url" content="https://dm-2026.github.io/mlb-props/" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://dm-2026.github.io/mlb-props/og-image.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #141820;
    --surface2: #1c2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8ecf0;
    --text2: #8a96a8;
    --text3: #556070;
    --prime: #22c55e;
    --prime-bg: rgba(34,197,94,0.10);
    --prime-border: rgba(34,197,94,0.25);
    --high: #3b82f6;
    --high-bg: rgba(59,130,246,0.10);
    --high-border: rgba(59,130,246,0.25);
    --med: #f59e0b;
    --med-bg: rgba(245,158,11,0.10);
    --med-border: rgba(245,158,11,0.25);
    --fade: #ef4444;
    --fade-bg: rgba(239,68,68,0.08);
    --fade-border: rgba(239,68,68,0.20);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
  body { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--mono); font-size: 18px; font-weight: 500; letter-spacing: -0.5px; }
  .logo span { color: var(--prime); }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .header-date { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .live-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 2px; background: var(--prime-bg); color: var(--prime); border: 1px solid var(--prime-border); }
  .seed-badge { background: var(--med-bg); color: var(--med); border-color: var(--med-border); }

  /* Ticker */
  .ticker-wrap { width: 100%; overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); margin-bottom: 20px; height: 28px; display: flex; align-items: center; }
  .ticker-track { display: flex; align-items: center; white-space: nowrap; animation: ticker 40s linear infinite; }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-item { font-family: var(--mono); font-size: 11px; color: var(--text2); padding: 0 28px; border-right: 1px solid var(--border); }
  .ticker-item.prime { color: var(--prime); }
  .ticker-item.boost { color: #86efac; }
  .ticker-item.suppress { color: #fca5a5; }
  .ticker-item.warn { color: var(--med); }
  .ticker-sep { color: var(--text3); padding: 0 8px; }

  /* Summary */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .sum-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .sum-value { font-family: var(--mono); font-size: 20px; font-weight: 500; }
  .sum-value.prime { color: var(--prime); }
  .sum-value.high  { color: var(--high); }
  .sum-value.med   { color: var(--med); }
  .sum-value.fade  { color: var(--fade); }

  .section-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.10em; margin: 16px 0 8px; }

  /* Compact game chips */
  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 6px; margin-bottom: 20px; }
  .game-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .game-chip:hover { border-color: var(--border2); }
  .game-chip.open { border-color: var(--prime-border); grid-column: 1 / -1; }
  .chip-top { padding: 7px 10px; }
  .chip-matchup { font-family: var(--mono); font-size: 12px; font-weight: 500; margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .chip-arrow { font-size: 9px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
  .game-chip.open .chip-arrow { transform: rotate(180deg); }
  .chip-counts { display: flex; gap: 5px; align-items: center; }
  .chip-venue { font-size: 10px; color: var(--text3); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip-badges { display: flex; flex-wrap: wrap; gap: 3px; }
  .chip-panel { display: none; border-top: 1px solid var(--border); padding: 12px 14px; background: var(--surface2); }
  .game-chip.open .chip-panel { display: block; }
  .chip-starters { display: flex; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip-starter .sl { color: var(--text3); font-family: var(--mono); font-size: 10px; margin-bottom: 2px; }
  .chip-starter .sn { color: var(--text); font-weight: 500; font-size: 12px; }
  .chip-targets { display: flex; flex-direction: column; gap: 5px; }
  .chip-no-targets { font-family: var(--mono); font-size: 12px; color: var(--text3); padding: 8px 0; }
  .chip-sort-btn { font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface); color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .chip-sort-btn:hover { border-color: var(--border2); color: var(--text2); }
  .chip-sort-btn.active { background: var(--prime-bg); border-color: var(--prime-border); color: var(--prime); }

  /* Badges */
  .badge { font-family: var(--mono); font-size: 9px; padding: 2px 5px; border-radius: 2px; border: 1px solid; white-space: nowrap; }
  .badge-boost    { background: rgba(34,197,94,0.08);  color: #86efac; border-color: rgba(34,197,94,0.20); }
  .badge-neutral  { background: var(--surface2); color: var(--text3); border-color: var(--border); }
  .badge-suppress { background: rgba(239,68,68,0.08); color: #fca5a5; border-color: rgba(239,68,68,0.20); }
  .badge-wind     { background: rgba(59,130,246,0.08); color: #93c5fd; border-color: rgba(59,130,246,0.20); }
  .badge-rain     { background: rgba(245,158,11,0.08); color: #fcd34d; border-color: rgba(245,158,11,0.20); }
  .badge-dome     { background: var(--surface2); color: var(--text3); border-color: var(--border); }

  /* Filter row */
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { font-family: var(--mono); font-size: 11px; padding: 5px 12px; border-radius: 3px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active-prime { background: var(--prime-bg); border-color: var(--prime-border); color: var(--prime); }
  .filter-btn.active-high  { background: var(--high-bg);  border-color: var(--high-border);  color: var(--high); }
  .filter-btn.active-med   { background: var(--med-bg);   border-color: var(--med-border);   color: var(--med); }
  .filter-btn.active-all   { background: var(--surface2); border-color: var(--border2); color: var(--text); }

  /* Batter cards */
  .targets-list { display: flex; flex-direction: column; gap: 6px; }
  .batter-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.15s; }
  .batter-card:hover { border-color: var(--border2); }
  .batter-card.expanded { border-color: var(--border2); }
  .card-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; }
  .tier-bar { width: 3px; height: 40px; border-radius: 2px; flex-shrink: 0; }
  .tier-bar.PRIME { background: var(--prime); }
  .tier-bar.HIGH  { background: var(--high); }
  .tier-bar.MED   { background: var(--med); }
  .score-box { width: 44px; height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 15px; font-weight: 500; flex-shrink: 0; }
  .score-box.PRIME { background: var(--prime-bg); color: var(--prime); border: 1px solid var(--prime-border); }
  .score-box.HIGH  { background: var(--high-bg);  color: var(--high);  border: 1px solid var(--high-border); }
  .score-box.MED   { background: var(--med-bg);   color: var(--med);   border: 1px solid var(--med-border); }
  .card-info { flex: 1; min-width: 0; }
  .batter-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .batter-sub { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-badges-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .expand-icon { color: var(--text3); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .batter-card.expanded .expand-icon { transform: rotate(180deg); }
  .card-detail { display: none; padding: 0 14px 14px; }
  .batter-card.expanded .card-detail { display: block; }
  .insight-box { background: var(--surface2); border-left: 3px solid var(--border2); border-radius: 0 4px 4px 0; padding: 8px 12px; font-size: 12px; color: var(--text2); font-style: italic; margin-bottom: 12px; }
  .components-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 6px; margin-bottom: 14px; }
  .comp-item { background: var(--surface2); border-radius: 4px; padding: 8px 10px; }
  .comp-label { font-size: 9px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .comp-bar-bg { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 3px; }
  .comp-bar-fill { height: 100%; border-radius: 2px; }
  .comp-value { font-family: var(--mono); font-size: 12px; }
  .matrix-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .pitch-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .pitch-table th { font-family: var(--mono); font-weight: 400; color: var(--text3); text-align: left; padding: 4px 8px 4px 0; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .pitch-table td { padding: 5px 8px 5px 0; color: var(--text2); border-bottom: 1px solid var(--border); vertical-align: middle; }
  .pitch-table tr:last-child td { border: none; }
  .pitch-name { font-family: var(--mono); font-weight: 500; color: var(--text); }
  .vuln-cell { display: flex; align-items: center; gap: 6px; }
  .vuln-bar { width: 50px; height: 3px; background: var(--border); border-radius: 2px; position: relative; }
  .vuln-fill { position: absolute; top: 0; left: 0; height: 100%; border-radius: 2px; }
  .hi { background: var(--fade); } .md { background: var(--med); } .lo { background: var(--prime); }
  .stat-val { font-family: var(--mono); color: var(--text); }
  .stat-dim { color: var(--text3); }
  .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .meta-item .mk { color: var(--text3); font-family: var(--mono); font-size: 10px; }
  .meta-item .mv { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .tier-divider { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; padding: 6px 0 4px; margin-top: 8px; display: flex; align-items: center; gap: 10px; }
  .tier-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .tier-divider.PRIME { color: var(--prime); } .tier-divider.HIGH { color: var(--high); } .tier-divider.MED { color: var(--med); }
  .fade-list { background: var(--surface); border: 1px solid var(--fade-border); border-radius: 8px; overflow: hidden; }
  .fade-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .fade-item:last-child { border: none; }
  .fade-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fade); flex-shrink: 0; }
  .fade-name { font-size: 13px; font-weight: 500; }
  .fade-reason { margin-left: auto; font-size: 11px; font-family: var(--mono); color: var(--text3); }
  .loading { text-align: center; padding: 60px 20px; color: var(--text3); font-family: var(--mono); }
  .empty { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 32px; text-align: center; color: var(--text3); font-family: var(--mono); font-size: 13px; }
  .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text3); display: flex; justify-content: space-between; }

  @media (max-width: 600px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .components-grid { grid-template-columns: repeat(2, 1fr); }
    .fade-reason { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">MLB<span>.</span>HR<span>.</span>Props</div>
  <div class="header-right">
    <div class="header-date" id="header-date">Loading…</div>
    <div class="live-badge seed-badge" id="data-badge">SEED DATA</div>
  </div>
</div>

<!-- Ticker tape -->
<div class="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span class="ticker-item">Loading slate…</span>
  </div>
</div>

<div class="summary">
  <div class="sum-card"><div class="sum-label">Games</div><div class="sum-value" id="s-games">—</div></div>
  <div class="sum-card"><div class="sum-label">Prime</div><div class="sum-value prime" id="s-prime">—</div></div>
  <div class="sum-card"><div class="sum-label">High</div><div class="sum-value high" id="s-high">—</div></div>
  <div class="sum-card"><div class="sum-label">Auto-fades</div><div class="sum-value fade" id="s-fades">—</div></div>
</div>

<div class="section-label">Today's Slate — click any game to expand</div>
<div class="games-grid" id="games-grid"><div class="loading">Loading…</div></div>

<div class="section-label" style="margin-top:24px;">Ranked Targets</div>
<div class="filter-row">
  <button class="filter-btn active-all" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('PRIME',this)">Prime</button>
  <button class="filter-btn" onclick="setFilter('HIGH',this)">High</button>
  <button class="filter-btn" onclick="setFilter('MED',this)">Med</button>
</div>
<div class="targets-list" id="targets-list"><div class="loading">Scoring matchups…</div></div>

<div class="section-label" style="margin-top:28px;">Auto-Fade List</div>
<div id="fades-section"><div class="loading">—</div></div>

<div class="footer">
  <span id="footer-gen">Generated: —</span>
  <span>MLB HR Props Pipeline · github.com/dm-2026/mlb-props</span>
</div>

<script>
const PITCH_NAMES = {
  FF:'Four-seam', SI:'Sinker', FC:'Cutter', CH:'Changeup',
  SL:'Slider', CU:'Curveball', SW:'Sweeper', FS:'Splitter',
  KC:'Knuckle curve', CS:'Slow curve', KN:'Knuckleball', ST:'Sweeper',
};
const COMP_LABELS = {
  ev_barrel:'EV + Barrel', pitcher_vuln:'Pitcher Vuln',
  pitch_collision:'Pitch Collision', park_factor:'Park Factor',
  platoon:'Platoon Edge', weather:'Weather', recent_form:'L14D Form',
};
const COMP_COLORS = {
  ev_barrel:'#3b82f6', pitcher_vuln:'#ef4444', pitch_collision:'#22c55e',
  park_factor:'#f59e0b', platoon:'#a78bfa', weather:'#38bdf8', recent_form:'#fb923c',
};
const TIER_ORDER = {PRIME:0, HIGH:1, MED:2};
const AVG_HR_PER_GAME = 0.98; // league average HRs per team per game ~2026

let currentFilter = 'all';
let allData = null;

async function loadData() {
  try {
    const r = await fetch(`data/data.json?t=${Date.now()}`);
    if (!r.ok) throw new Error();
    allData = await r.json();
  } catch(e) {
    allData = {generated_at:new Date().toISOString(), date:new Date().toISOString().split('T')[0],
      pybaseball_live:false, summary:{total_games:0,prime_count:0,high_count:0,med_count:0,fade_count:0},
      games:[], targets:[], auto_fades:[]};
  }
  render(allData);
}

function render(data) {
  const d = new Date(data.date + 'T12:00:00');
  document.getElementById('header-date').textContent =
    d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const badge = document.getElementById('data-badge');
  badge.textContent = data.pybaseball_live ? 'LIVE DATA' : 'SEED DATA';
  badge.className = data.pybaseball_live ? 'live-badge' : 'live-badge seed-badge';
  const s = data.summary;
  document.getElementById('s-games').textContent = s.total_games;
  document.getElementById('s-prime').textContent = s.prime_count;
  document.getElementById('s-high').textContent  = s.high_count;
  document.getElementById('s-fades').textContent = s.fade_count;
  buildTicker(data);
  renderSlate(data.games, data.targets);
  renderTargets(data.targets);
  renderFades(data.auto_fades);
  const gen = new Date(data.generated_at);
  document.getElementById('footer-gen').textContent =
    'Generated: ' + gen.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ── Ticker ────────────────────────────────────────────────────────────────────
function buildTicker(data) {
  const items = [];
  const games = data.games || [];
  const targets = data.targets || [];
  const s = data.summary;

  // Slate HR index — weighted avg of all park+weather multipliers
  if (games.length) {
    const outdoorGames = games.filter(g => !g.park_dome);
    if (outdoorGames.length) {
      const avgMult = outdoorGames.reduce((sum, g) => {
        const pf = (g.park_factor || 100) / 100;
        const wm = (g.weather || {}).hr_multiplier || 1.0;
        return sum + pf * wm;
      }, 0) / outdoorGames.length;
      const baseline = AVG_HR_PER_GAME * games.length * 2; // both teams
      const expected = (baseline * avgMult).toFixed(1);
      const diff = ((avgMult - 1) * 100).toFixed(0);
      const cls = avgMult > 1.05 ? 'boost' : avgMult < 0.95 ? 'suppress' : '';
      items.push({text: `Slate HR Index: ~${expected} expected today (${diff > 0 ? '+' : ''}${diff}% vs avg)`, cls});
    }
  }

  // Target summary
  if (s.prime_count > 0) {
    items.push({text: `${s.prime_count} PRIME target${s.prime_count>1?'s':''} today`, cls:'prime'});
  } else {
    items.push({text: `${s.high_count} HIGH · ${s.med_count} MED targets today`, cls:''});
  }

  // PRIME players only
  targets.filter(t => t.tier === 'PRIME').forEach(t => {
    items.push({text: `★ ${t.batter_name} (${t.batter_team}) — PRIME ${t.score}`, cls:'prime'});
  });

  // Top wind-out games
  games.filter(g => !g.park_dome).forEach(g => {
    const w = g.weather || {};
    const wl = w.wind_label || '';
    if (wl.includes('OUT') && w.wind_mph >= 10) {
      items.push({text: `Wind OUT ${w.wind_mph}mph at ${g.venue||g.home_team} · ${g.away_team} @ ${g.home_team}`, cls:'boost'});
    }
    if (wl.includes('IN') && w.wind_mph >= 10) {
      items.push({text: `Wind IN ${w.wind_mph}mph at ${g.venue||g.home_team} — HR suppressed`, cls:'suppress'});
    }
  });

  // Top park boosts
  games.filter(g => g.park_factor >= 115 && !g.park_dome).forEach(g => {
    items.push({text: `${g.venue||g.home_team}: Park +${g.park_factor-100}% HR boost`, cls:'boost'});
  });

  // Suppress parks
  games.filter(g => g.park_suppress && !g.park_dome).forEach(g => {
    items.push({text: `${g.venue||g.home_team}: Park ${g.park_factor-100}% — fade HR props`, cls:'suppress'});
  });

  // Rain warnings
  games.filter(g => (g.weather||{}).rain_chance > 0.4 && !g.park_dome).forEach(g => {
    items.push({text: `Rain ${Math.round((g.weather.rain_chance||0)*100)}% · ${g.away_team} @ ${g.home_team} — postpone risk`, cls:'warn'});
  });

  // Cold games
  games.filter(g => (g.weather||{}).temp_f < 45 && !g.park_dome).forEach(g => {
    items.push({text: `${(g.weather||{}).temp_f}°F at ${g.venue||g.home_team} — cold suppression`, cls:'suppress'});
  });

  // Fallback
  if (items.length < 2) {
    items.push({text: `${games.length} games on the slate today`, cls:''});
    items.push({text: 'MLB HR Props Pipeline · updated daily', cls:''});
  }

  // Duplicate for seamless loop
  const all = [...items, ...items];
  const html = all.map(item =>
    `<span class="ticker-item ${item.cls||''}">${item.text}</span>`
  ).join('');

  document.getElementById('ticker-track').innerHTML = html;

  // Scale animation speed to content length
  const totalItems = all.length;
  const speed = Math.max(20, totalItems * 4);
  document.getElementById('ticker-track').style.animationDuration = `${speed}s`;
}

// ── Weather badge helpers ─────────────────────────────────────────────────────
function wBadges(g) {
  const pf=g.park_factor, w=g.weather||{}, wl=w.wind_label||'';
  const pfB = g.park_dome ? `<span class="badge badge-dome">Dome</span>`
    : pf>=110 ? `<span class="badge badge-boost">Park +${pf-100}%</span>`
    : pf<=90  ? `<span class="badge badge-suppress">Park ${pf-100}%</span>`
    : `<span class="badge badge-neutral">Park ${pf}</span>`;
  const wB = g.park_dome?'': wl.includes('OUT')?`<span class="badge badge-boost">${wl}</span>`
    : wl.includes('IN')?`<span class="badge badge-suppress">${wl}</span>`
    : wl&&wl!=='—'?`<span class="badge badge-wind">${wl}</span>`:'';
  const rB = (!g.park_dome&&(w.rain_chance||0)>0.35)
    ?`<span class="badge badge-rain">Rain ${Math.round(w.rain_chance*100)}%</span>`:'';
  const tB = !g.park_dome?`<span class="badge badge-neutral">${w.temp_f||'—'}°F</span>`:'';
  return pfB+wB+tB+rB;
}

// ── Slate ─────────────────────────────────────────────────────────────────────
const gameSort = {}; // tracks 'score' or 'collision' per game index

function renderSlate(games, targets) {
  const el = document.getElementById('games-grid');
  if (!games||!games.length){el.innerHTML='<div class="empty">No games today</div>';return;}
  const byGame = {};
  (targets||[]).forEach(t => { const k=t.game; if(!byGame[k])byGame[k]=[]; byGame[k].push(t); });

  el.innerHTML = games.map((g,gi) => {
    const key = `${g.away_team} @ ${g.home_team}`;
    const tgts = sortT(byGame[key]||[]);
    const prN=tgts.filter(t=>t.tier==='PRIME').length;
    const hiN=tgts.filter(t=>t.tier==='HIGH').length;
    const mdN=tgts.filter(t=>t.tier==='MED').length;
    const counts = [
      prN&&`<span style="color:var(--prime);font-family:var(--mono);font-size:10px">${prN}P</span>`,
      hiN&&`<span style="color:var(--high);font-family:var(--mono);font-size:10px">${hiN}H</span>`,
      mdN&&`<span style="color:var(--med);font-family:var(--mono);font-size:10px">${mdN}M</span>`,
    ].filter(Boolean).join(' ');

    const awayP = g.away_probable||{};
    const homeP = g.home_probable||{};
    const batterRows = tgts.length
      ? tgts.map((t,ti) => batterCard(t,`g${gi}_${ti}`)).join('')
      : `<div class="chip-no-targets">No scored targets for this game</div>`;

    return `<div class="game-chip" id="chip-${gi}" onclick="toggleChip(${gi},event)">
      <div class="chip-top">
        <div class="chip-matchup">
          <span>${key}</span>
          <span style="display:flex;align-items:center;gap:5px">${counts}<span class="chip-arrow">▾</span></span>
        </div>
        <div class="chip-venue">${g.venue||''}</div>
        <div class="chip-badges">${wBadges(g)}</div>
      </div>
      <div class="chip-panel">
        <div class="chip-starters">
          <div class="chip-starter"><div class="sl">Away starter</div><div class="sn">${awayP.name||'TBD'}${awayP.throws?' ('+awayP.throws+'HP)':''}</div></div>
          <div class="chip-starter"><div class="sl">Home starter</div><div class="sn">${homeP.name||'TBD'}${homeP.throws?' ('+homeP.throws+'HP)':''}</div></div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <button class="chip-sort-btn active" id="sort-score-${gi}" onclick="setGameSort(${gi},'score',event)">Score</button>
          <button class="chip-sort-btn" id="sort-collision-${gi}" onclick="setGameSort(${gi},'collision',event)">Pitch Collision</button>
        </div>
        <div class="chip-targets" id="chip-targets-${gi}">${batterRows}</div>
      </div>
    </div>`;
  }).join('');
}

function setGameSort(gi, mode, e) {
  e.stopPropagation();
  gameSort[gi] = mode;

  // Update button styles
  document.getElementById(`sort-score-${gi}`).classList.toggle('active', mode==='score');
  document.getElementById(`sort-collision-${gi}`).classList.toggle('active', mode==='collision');

  // Re-sort and re-render targets for this game
  const key = allData.games[gi] ? `${allData.games[gi].away_team} @ ${allData.games[gi].home_team}` : '';
  const tgts = (allData.targets||[]).filter(t => t.game === key);

  let sorted;
  if (mode === 'collision') {
    sorted = [...tgts].sort((a,b) =>
      (b.components?.pitch_collision||0) - (a.components?.pitch_collision||0)
    );
  } else {
    sorted = sortT(tgts);
  }

  const html = sorted.length
    ? sorted.map((t,ti) => batterCard(t,`g${gi}_r${ti}`)).join('')
    : `<div class="chip-no-targets">No scored targets for this game</div>`;

  document.getElementById(`chip-targets-${gi}`).innerHTML = html;
}

function toggleChip(gi, e) {
  if (e.target.closest('.card-detail')) return;
  if (e.target.closest('.chip-sort-btn')) return;
  const chip = document.getElementById(`chip-${gi}`);
  const wasOpen = chip.classList.contains('open');
  document.querySelectorAll('.game-chip.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) chip.classList.add('open');
}

// ── Ranked ────────────────────────────────────────────────────────────────────
function sortT(arr) {
  return [...arr].sort((a,b) =>
    TIER_ORDER[a.tier]!==TIER_ORDER[b.tier]
      ? TIER_ORDER[a.tier]-TIER_ORDER[b.tier] : b.score-a.score);
}

function renderTargets(targets) {
  const el = document.getElementById('targets-list');
  if (!targets||!targets.length){el.innerHTML='<div class="empty">No targets — run pipeline.py</div>';return;}
  const filtered = currentFilter==='all'?targets:targets.filter(t=>t.tier===currentFilter);
  if (!filtered.length){el.innerHTML=`<div class="empty">No ${currentFilter} targets today</div>`;return;}
  const sorted = sortT(filtered);
  let html='', last=null;
  sorted.forEach((t,i) => {
    if (t.tier!==last) {
      const lbl=t.tier==='PRIME'?'Prime — 3+ factors':t.tier==='HIGH'?'High — 2 strong factors':'Med — 1 strong factor';
      html+=`<div class="tier-divider ${t.tier}">${lbl}</div>`;
      last=t.tier;
    }
    html+=batterCard(t,`r${i}`);
  });
  el.innerHTML=html;
}

// ── Batter card ───────────────────────────────────────────────────────────────
function batterCard(t, idx) {
  const meta = t.batter_meta||{};
  const parkBadge = t.park_suppress
    ? `<span class="badge badge-suppress">Park ${t.park_factor-100}%</span>`
    : t.park_factor>=110?`<span class="badge badge-boost">Park +${t.park_factor-100}%</span>`
    :`<span class="badge badge-neutral">Park ${t.park_factor}</span>`;
  const wl=t.weather_label||'';
  const windBadge = wl&&wl!=='—'&&wl!=='Dome'
    ?(wl.includes('OUT')?`<span class="badge badge-boost">${wl}</span>`
    :wl.includes('IN')?`<span class="badge badge-suppress">${wl}</span>`
    :`<span class="badge badge-wind">${wl}</span>`):'';
  const platoonBadge = t.batter_hand!==t.pitcher_throws?`<span class="badge badge-boost">Platoon ✓</span>`:'';
  const formBadge = (meta.hr_recent_14d||0)>=2?`<span class="badge badge-boost">${meta.hr_recent_14d} HR L14D</span>`:'';

  const compBars = Object.entries(t.components||{}).map(([k,v]) => {
    const c=COMP_COLORS[k]||'#666';
    const displayVal = k==='recent_form'?`${meta.hr_recent_14d||0} HR`:v;
    return `<div class="comp-item">
      <div class="comp-label">${COMP_LABELS[k]||k}</div>
      <div class="comp-bar-bg"><div class="comp-bar-fill" style="width:${v}%;background:${c}"></div></div>
      <div class="comp-value" style="color:${c}">${displayVal}</div>
    </div>`;
  }).join('');

  const pitchRows = Object.entries(t.pitch_matrix||{}).map(([pt,d]) => {
    const vuln=Math.min((d.pitcher_hr_pct||0)/10*100,100);  // vuln bar uses hr_pct internally
    const vc=vuln>65?'hi':vuln>35?'md':'lo';
    const hrDist = d.pitcher_hr_dist!=null ? d.pitcher_hr_dist+'%' : '—';
    return `<tr>
      <td class="pitch-name">${PITCH_NAMES[pt]||pt}</td>
      <td class="stat-val">${d.pitcher_usage!=null?d.pitcher_usage.toFixed(0)+'%':'—'}</td>
      <td class="stat-val">${d.slg?d.slg.toFixed(3):'—'}</td>
      <td class="stat-val">${hrDist}</td>
      <td><div class="vuln-cell"><div class="vuln-bar"><div class="vuln-fill ${vc}" style="width:${Math.round(vuln)}%"></div></div></div></td>
      <td class="stat-dim">${d.avg_launch_angle!=null?d.avg_launch_angle.toFixed(1)+'°':'—'}</td>
    </tr>`;
  }).join('');

  const hasMatrix = Object.keys(t.pitch_matrix||{}).length>0;
  const handLabel = t.batter_hand?` vs ${t.batter_hand}HB`:'';
  const ev=meta.avg_ev?`${meta.avg_ev} mph EV`:'';
  const barrel=meta.barrel_pct?`${meta.barrel_pct}% barrel`:'';
  const form=(meta.hr_recent_14d||0)>0?`${meta.hr_recent_14d} HR L14D`:'';
  const pa26=(meta.pa_2026||0)>0?`${meta.pa_2026} PA '26`:'';

  const dominant = t.dominant_signals||[];
  const hasStar = dominant.length > 0;
  const starTip = dominant.map(s => ({
    pitcher_vuln:'★ Elite pitcher vulnerability',
    pitch_collision:'★ Elite pitch collision',
    ev_barrel:'★ Elite power profile',
    park_factor:'★ Premium park advantage',
    recent_form:'★ Red-hot form',
  }[s]||s)).join(' · ');

  return `<div class="batter-card" id="card-${idx}">
    <div class="card-header" onclick="toggleCard('${idx}')">
      <div class="tier-bar ${t.tier}"></div>
      <div class="score-box ${t.tier}" style="position:relative">
        ${t.score}
        ${hasStar?`<span title="${starTip}" style="position:absolute;top:-4px;right:-4px;font-size:9px;color:#fbbf24;line-height:1">★</span>`:''}
      </div>
      <div class="card-info">
        <div class="batter-name">${t.batter_name}</div>
        <div class="batter-sub">${t.batter_team} vs ${t.pitcher_name} (${t.pitcher_throws}HP) · ${t.venue||t.game}</div>
        <div class="card-badges-row">${parkBadge}${windBadge}${platoonBadge}${formBadge}</div>
      </div>
      <div class="expand-icon">▾</div>
    </div>
    <div class="card-detail">
      <div class="insight-box">${t.insight}</div>
      <div class="components-grid">${compBars}</div>
      ${hasMatrix?`<div class="matrix-label">Pitch collision matrix${handLabel} · HR Dist = % of pitcher's HRs on that pitch</div>
        <table class="pitch-table">
          <thead><tr><th>Pitch</th><th>Usage</th><th>Batter SLG</th><th>HR Dist${handLabel||''}</th><th>Vuln</th><th>Avg LA</th></tr></thead>
          <tbody>${pitchRows}</tbody>
        </table>`:''}
      <div class="meta-row">
        ${ev?`<div class="meta-item"><div class="mk">Exit velo</div><div class="mv">${ev}</div></div>`:''}
        ${barrel?`<div class="meta-item"><div class="mk">Barrel%</div><div class="mv">${barrel}</div></div>`:''}
        ${form?`<div class="meta-item"><div class="mk">Recent</div><div class="mv">${form}</div></div>`:''}
        ${pa26?`<div class="meta-item"><div class="mk">2026 PA</div><div class="mv">${pa26}</div></div>`:''}
        <div class="meta-item"><div class="mk">Park factor</div><div class="mv">${t.park_factor}</div></div>
        <div class="meta-item"><div class="mk">HR mult</div><div class="mv">${(t.hr_multiplier||1).toFixed(2)}×</div></div>
        ${t.pitcher_overall_hr9!=null?`<div class="meta-item"><div class="mk">Pitcher HR/9</div><div class="mv">${t.pitcher_overall_hr9.toFixed(2)}</div></div>`:''}
      </div>
    </div>
  </div>`;
}

// ── Fades ─────────────────────────────────────────────────────────────────────
function renderFades(fades) {
  const el=document.getElementById('fades-section');
  if (!fades||!fades.length){el.innerHTML='<div class="empty">No auto-fades</div>';return;}
  el.innerHTML=`<div class="fade-list">${fades.map(f=>`<div class="fade-item">
    <div class="fade-dot"></div><div class="fade-name">${f.pitcher_name}</div>
    <div class="fade-reason">${f.reason}</div>
  </div>`).join('')}</div>`;
}

function toggleCard(idx) {
  event.stopPropagation();
  document.getElementById(`card-${idx}`).classList.toggle('expanded');
}

function setFilter(tier, btn) {
  currentFilter=tier;
  document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');
  btn.className=tier==='all'?'filter-btn active-all':tier==='PRIME'?'filter-btn active-prime':tier==='HIGH'?'filter-btn active-high':'filter-btn active-med';
  if (allData) renderTargets(allData.targets);
}

loadData();
</script>
